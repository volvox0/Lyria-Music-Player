<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyria Music Player</title>
    <link rel="icon" href="images/音楽.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="images/音楽.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; user-select: none; overflow-x: hidden; }
        .glass-morphism { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .slider-thumb::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #38bdf8; cursor: pointer; box-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        .active-icon { color: #38bdf8; filter: drop-shadow(0 0 5px rgba(56, 189, 248, 0.8)); }
        .view-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease; }
        .hidden-view { display: none !important; opacity: 0; transform: translateY(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .song-item:active { transform: scale(0.98); background-color: rgba(56, 189, 248, 0.1); }
        #mini-player { transition: transform 0.3s ease, opacity 0.3s ease; }
        .mini-player-hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 sm:p-4">
    <div id="list-view" class="w-full max-w-md h-[100dvh] sm:h-[90vh] sm:max-h-[800px] flex flex-col p-6 overflow-hidden relative">
        <header class="mb-8 mt-4 text-center">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-white to-slate-500 bg-clip-text text-transparent">Lyria Library</h1>
        </header>
        <div id="home-song-list" class="flex-grow overflow-y-auto no-scrollbar space-y-4 pb-24"></div>
        <div id="mini-player" class="mini-player-hidden absolute bottom-4 left-4 right-4 h-16 glass-morphism rounded-2xl flex items-center px-3 gap-3 shadow-2xl z-20 cursor-pointer overflow-hidden border border-white/10">
            <div id="mini-progress" class="absolute top-0 left-0 h-0.5 bg-sky-400" style="width: 0%"></div>
            <div class="w-10 h-10 rounded-lg overflow-hidden shrink-0 shadow-md">
                <img id="mini-album-art" src="" class="w-full h-full object-cover">
            </div>
            <div class="flex-grow min-w-0">
                <div id="mini-song-title" class="font-bold text-sm truncate"></div>
                <div id="mini-song-artist" class="text-[10px] text-slate-400 truncate"></div>
            </div>
            <button id="mini-play-pause" class="p-2 text-white active:scale-90">
                <i id="mini-play-icon" data-lucide="play" class="w-6 h-6 fill-current"></i>
            </button>
        </div>
    </div>

    <div id="player-view" class="hidden-view w-full max-w-md flex flex-col h-[100dvh] sm:h-[90vh] sm:max-h-[840px] glass-morphism sm:rounded-[2.5rem] shadow-2xl pt-6 px-6 pb-8 relative overflow-hidden justify-between">
        <div id="bg-glow" class="absolute -top-24 -left-24 w-64 h-64 bg-blue-600/20 rounded-full blur-[80px] pointer-events-none"></div>
        <div id="bg-glow-2" class="absolute -bottom-24 -right-24 w-64 h-64 bg-purple-600/20 rounded-full blur-[80px] pointer-events-none"></div>
        <div class="flex justify-between items-center z-10 mb-2">
            <button id="back-to-list" class="p-2 text-slate-300 hover:text-white transition-colors">
                <i data-lucide="chevron-left" class="w-8 h-8"></i>
            </button>
            <span class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Now Playing</span>
            <div class="w-10"></div>
        </div>
        <div class="flex flex-col items-center flex-1 justify-center min-h-0">
            <div class="w-full max-w-[320px] aspect-square rounded-3xl overflow-hidden shadow-2xl mb-6 border border-white/5">
                <img id="album-art" src="" class="w-full h-full object-cover transition-all duration-700 transform scale-100">
            </div>
            <div class="w-full text-center mb-4">
                <h2 id="song-title" class="text-2xl font-bold truncate px-4"></h2>
                <p id="song-artist" class="text-slate-400 text-sm mt-1 uppercase tracking-widest"></p>
            </div>
        </div>
        <div class="w-full space-y-6 z-10 mt-auto">
            <div class="w-full">
                <input type="range" id="seek-slider" value="0" step="0.1" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb accent-sky-400">
                <div class="flex justify-between text-[10px] text-slate-500 mt-2 font-mono tracking-widest">
                    <span id="current-time">0:00</span>
                    <span id="total-duration">0:00</span>
                </div>
            </div>
            <div class="w-full flex items-center justify-between px-2">
                <button id="shuffle-btn" class="p-2 text-slate-400 active:scale-90"><i data-lucide="shuffle" class="w-5 h-5"></i></button>
                <div class="flex items-center gap-6">
                    <button id="prev-btn" class="p-2 text-white active:scale-90"><i data-lucide="skip-back" class="w-8 h-8 fill-current"></i></button>
                    <button id="play-pause-btn" class="w-16 h-16 bg-white text-slate-950 rounded-full flex items-center justify-center shadow-lg active:scale-95">
                        <i id="play-icon" data-lucide="play" class="w-8 h-8 fill-current ml-1"></i>
                    </button>
                    <button id="next-btn" class="p-2 text-white active:scale-90"><i data-lucide="skip-forward" class="w-8 h-8 fill-current"></i></button>
                </div>
                <button id="repeat-btn" class="p-2 text-slate-400 active:scale-90"><i id="repeat-icon" data-lucide="repeat" class="w-5 h-5"></i></button>
            </div>
            <div class="flex items-center justify-between w-full px-2 gap-4 pb-2">
                <div class="flex items-center gap-3 flex-1">
                    <button id="mute-toggle" class="text-slate-500"><i id="volume-icon" data-lucide="volume-2" class="w-5 h-5"></i></button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" class="w-full h-1 bg-slate-700 rounded-lg appearance-none accent-sky-400">
                </div>
                <a id="download-link" href="#" download class="p-2 text-slate-400"><i data-lucide="download" class="w-5 h-5"></i></a>
            </div>
        </div>
    </div>
    <audio id="audio-element" preload="auto"></audio>

    <script>
        const songs = [
            { title: "Sugar In My Tea", artist: "Gemini Lyria", file: "Sugar_In_My_Tea.MP3", cover: "images/Sugar_In_My_Tea.png" },
            { title: "Token of Victory", artist: "Gemini Lyria", file: "Token_of_Victory.MP3", cover: "images/Token_of_Victory.png" },
            { title: "Level Up Power Off", artist: "Gemini Lyria", file: "Level_Up_Power_Off.MP3", cover: "images/Level_Up_Power_Off.png" },
            { title: "Gummy Physics", artist: "Gemini Lyria", file: "Gummy_Physics.mp3", cover: "images/Gummy_Physics.png" },
            { title: "Gearbox Joyride", artist: "Gemini Lyria", file: "Gearbox_Joyride.mp3", cover: "images/Gearbox_Joyride.png" },
            { title: "Assembly Line Rush", artist: "Gemini Lyria", file: "Assembly_Line_Rush.mp3", cover: "images/Assembly_Line_Rush.png" }
        ];

        let currentIdx = 0, isPlaying = false, isShuffle = false, repeatMode = 0, lastVolume = 0.8, isSongLoaded = false;
        const audio = document.getElementById('audio-element'), playPauseBtn = document.getElementById('play-pause-btn'), playIcon = document.getElementById('play-icon');
        const miniPlayPause = document.getElementById('mini-play-pause'), miniPlayIcon = document.getElementById('mini-play-icon'), seekSlider = document.getElementById('seek-slider');
        const volumeSlider = document.getElementById('volume-slider'), volumeIcon = document.getElementById('volume-icon'), miniPlayer = document.getElementById('mini-player');

        function initApp() {
            renderHomeList();
            lucide.createIcons();
            loadSong(currentIdx);
            setupMediaSession();
        }

        function renderHomeList() {
            document.getElementById('home-song-list').innerHTML = songs.map((s, i) => `
                <div class="song-item p-4 rounded-2xl glass-morphism border border-white/5 flex items-center gap-4 cursor-pointer transition-all hover:bg-white/5" onclick="playSongFromList(${i})">
                    <div class="relative"><img src="${s.cover}" class="w-14 h-14 rounded-xl object-cover shadow-lg" onerror="this.src='https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100'"></div>
                    <div class="flex-grow min-w-0"><div class="font-bold truncate text-lg">${s.title}</div><div class="text-xs text-slate-400 uppercase">${s.artist}</div></div>
                    <div class="text-sky-400"><i data-lucide="play" class="w-6 h-6 fill-current"></i></div>
                </div>`).join('');
            lucide.createIcons();
        }

        function playSongFromList(idx) {
            currentIdx = idx;
            loadSong(currentIdx);
            showPlayer();
            audio.play();
            isSongLoaded = true;
            updateMiniPlayerVisibility();
        }

        function showPlayer() {
            document.getElementById('list-view').classList.add('hidden');
            const pv = document.getElementById('player-view');
            pv.classList.remove('hidden-view');
            pv.style.display = 'flex';
            setTimeout(() => { pv.classList.add('view-transition'); pv.style.opacity = '1'; pv.style.transform = 'translateY(0)'; }, 50);
        }

        function showList() {
            const pv = document.getElementById('player-view');
            pv.style.opacity = '0'; pv.style.transform = 'translateY(20px)';
            setTimeout(() => { pv.style.display = 'none'; document.getElementById('list-view').classList.remove('hidden'); updateMiniPlayerVisibility(); }, 400);
        }

        function updateMiniPlayerVisibility() {
            if (isSongLoaded && document.getElementById('list-view').offsetParent !== null) miniPlayer.classList.remove('mini-player-hidden');
            else miniPlayer.classList.add('mini-player-hidden');
        }

        function loadSong(idx) {
            const s = songs[idx];
            document.getElementById('song-title').innerText = s.title;
            document.getElementById('song-artist').innerText = s.artist;
            document.getElementById('album-art').src = s.cover;
            audio.src = s.file;
            document.getElementById('download-link').href = s.file;
            document.getElementById('mini-song-title').innerText = s.title;
            document.getElementById('mini-song-artist').innerText = s.artist;
            document.getElementById('mini-album-art').src = s.cover;
            const clr = ['bg-blue-600/20', 'bg-purple-600/20', 'bg-emerald-600/20', 'bg-amber-600/20', 'bg-indigo-600/20', 'bg-rose-600/20'];
            document.getElementById('bg-glow').className = `absolute -top-24 -left-24 w-64 h-64 ${clr[idx % clr.length]} rounded-full blur-[80px] pointer-events-none`;
            updateMediaMetadata(s);
        }

        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('previoustrack', prevSong);
                navigator.mediaSession.setActionHandler('nexttrack', nextSong);
            }
        }

        function updateMediaMetadata(s) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({ title: s.title, artist: s.artist, album: "Lyria Library", artwork: [{ src: s.cover, sizes: '512x512', type: 'image/png' }] });
            }
        }

        function togglePlay() { isPlaying ? audio.pause() : audio.play(); }

        audio.onplay = () => {
            isPlaying = true;
            playIcon.setAttribute('data-lucide', 'pause');
            miniPlayIcon.setAttribute('data-lucide', 'pause');
            document.getElementById('album-art').classList.add('scale-105');
            lucide.createIcons();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
        };

        audio.onpause = () => {
            isPlaying = false;
            playIcon.setAttribute('data-lucide', 'play');
            miniPlayIcon.setAttribute('data-lucide', 'play');
            document.getElementById('album-art').classList.remove('scale-105');
            lucide.createIcons();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
        };

        function nextSong() {
            currentIdx = isShuffle ? Math.floor(Math.random() * songs.length) : (currentIdx + 1) % songs.length;
            loadSong(currentIdx);
            audio.play();
        }

        function prevSong() {
            currentIdx = (currentIdx - 1 + songs.length) % songs.length;
            loadSong(currentIdx);
            audio.play();
        }

        document.getElementById('shuffle-btn').onclick = () => { isShuffle = !isShuffle; document.getElementById('shuffle-btn').classList.toggle('active-icon', isShuffle); };
        document.getElementById('repeat-btn').onclick = () => {
            repeatMode = (repeatMode + 1) % 3;
            const ri = document.getElementById('repeat-icon'), rb = document.getElementById('repeat-btn');
            if (repeatMode === 0) { rb.classList.remove('active-icon'); ri.setAttribute('data-lucide', 'repeat'); }
            else if (repeatMode === 1) { rb.classList.add('active-icon'); ri.setAttribute('data-lucide', 'repeat'); }
            else { rb.classList.add('active-icon'); ri.setAttribute('data-lucide', 'repeat-1'); }
            lucide.createIcons();
        };

        audio.ontimeupdate = () => {
            if (!isNaN(audio.duration)) {
                const p = (audio.currentTime / audio.duration) * 100;
                seekSlider.value = p;
                document.getElementById('mini-progress').style.width = p + '%';
                document.getElementById('current-time').innerText = formatTime(audio.currentTime);
                document.getElementById('total-duration').innerText = formatTime(audio.duration);
            }
        };

        seekSlider.oninput = () => { audio.currentTime = (seekSlider.value / 100) * audio.duration; };
        volumeSlider.oninput = () => {
            const v = volumeSlider.value; audio.volume = v;
            if (v == 0) volumeIcon.setAttribute('data-lucide', 'volume-x');
            else if (v < 0.5) volumeIcon.setAttribute('data-lucide', 'volume-1');
            else volumeIcon.setAttribute('data-lucide', 'volume-2');
            if (v > 0) lastVolume = v;
            lucide.createIcons();
        };

        document.getElementById('mute-toggle').onclick = () => {
            if (audio.volume > 0) { lastVolume = audio.volume; audio.volume = 0; volumeSlider.value = 0; volumeIcon.setAttribute('data-lucide', 'volume-x'); }
            else { audio.volume = lastVolume; volumeSlider.value = lastVolume; volumeIcon.setAttribute('data-lucide', 'volume-2'); }
            lucide.createIcons();
        };

        audio.onended = () => {
            if (repeatMode === 2) { audio.currentTime = 0; audio.play(); }
            else if (repeatMode === 1 || currentIdx < songs.length - 1) nextSong();
            else { isPlaying = false; playIcon.setAttribute('data-lucide', 'play'); miniPlayIcon.setAttribute('data-lucide', 'play'); lucide.createIcons(); }
        };

        function formatTime(s) { const m = Math.floor(s / 60), sc = Math.floor(s % 60); return `${m}:${sc < 10 ? '0' : ''}${sc}`; }
        playPauseBtn.onclick = togglePlay;
        document.getElementById('next-btn').onclick = nextSong;
        document.getElementById('prev-btn').onclick = prevSong;
        document.getElementById('back-to-list').onclick = showList;
        miniPlayPause.onclick = (e) => { e.stopPropagation(); togglePlay(); };
        miniPlayer.onclick = showPlayer;
        window.onload = initApp;
    </script>
</body>
</html>
